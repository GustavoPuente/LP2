<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Formulário Principal</h1>

        <form name="nomeform" onsubmit="return validarForm()">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

            <label for="comentario">Comentário:</label>
            <textarea id="comentario" name="comentario"></textarea>

            <div class="radio-group">
                <p>Pesquisa:</p>
                <span>Primeira vez nesta página?</span>

                <label>
                    <input type="radio" name="pesquisa" value="sim">
                    Sim
                </label>

                <label>
                    <input type="radio" name="pesquisa" value="nao">
                    Não
                </label>
            </div>

            <div class="buttons">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>

        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
